name: Update Training Data

on:
  schedule:
    # 每天北京时间 09:00 (UTC 01:00) 自动执行
    - cron: '0 1 * * *'
  workflow_dispatch: # 也支持手动触发

permissions:
  contents: write
  pages: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install garminconnect -q

      - name: Fetch Garmin data
        env:
          GARMIN_TOKEN: ${{ secrets.GARMIN_TOKEN }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python3 fetch_garmin.py

      - name: Merge and build
        run: |
          # 把抓取的 Garmin 数据合并到 merged_data.js
          # 这里用在线版 build_merged_data.py 的轻量版
          python3 build_online_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merged_data.js garmin_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 auto-update: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
            echo "✅ Pushed updates"
          fi
