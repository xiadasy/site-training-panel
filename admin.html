<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>训练中心·管理模式</title><style>:root{--a:#ff5b3a;--bg:#090909;--c:#181818;--b:#303030;--t:#eee}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font:15px -apple-system,"PingFang SC";padding:16px}main{max-width:780px;margin:auto}h1{font-size:24px}section{background:var(--c);border:1px solid var(--b);border-radius:14px;padding:16px;margin:14px 0}h2{font-size:17px;color:var(--a)}label{display:block;color:#aaa;margin:10px 0 5px}input,select,textarea{width:100%;padding:12px;background:#222;border:1px solid #444;border-radius:9px;color:#fff;font-size:15px}textarea{min-height:100px}button{padding:11px 16px;border:0;border-radius:9px;background:var(--a);color:#fff;font-weight:700;margin:10px 6px 0 0}.secondary{background:#333}.status{padding:10px;border-radius:8px;background:#222;white-space:pre-wrap}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:550px){.grid{grid-template-columns:1fr}}small{color:#777}.danger{background:#a33}</style></head><body><main><h1>⚙️ 训练中心·管理模式</h1><p>直接修改并同步到网页。Token只保存在当前浏览器。</p><section><h2>连接 GitHub</h2><label>Fine-grained Token</label><input id="token" type="password" placeholder="github_pat_…"><button onclick="connect()">连接并读取数据</button><button class="secondary" onclick="forget()">清除本机凭证</button><div id="status" class="status">尚未连接</div></section><section><h2>体重</h2><div class="grid"><div><label>日期</label><input id="wdate" type="date"></div><div><label>体重 kg</label><input id="weight" type="number" step="0.1"></div></div><label>称重说明</label><input id="wsource" placeholder="如：跑后"><button onclick="saveWeight()">保存体重并同步</button></section><section><h2>当日跑步补充</h2><label>日期</label><input id="ddate" type="date"><label>跑鞋</label><select id="dshoe"></select><label>主观感受</label><textarea id="feel"></textarea><button onclick="saveDay()">保存跑鞋与感受</button></section><section><h2>跑鞋管理</h2><label>选择已有鞋</label><select id="shoeSelect" onchange="loadShoe()"></select><div class="grid"><div><label>内部名称</label><input id="sname"></div><div><label>展示名称</label><input id="sdisplay"></div><div><label>当前里程 km</label><input id="skm" type="number" step="0.00001"></div><div><label>使用次数</label><input id="sruns" type="number"></div></div><label>备注</label><input id="snote"><label>鞋图（PNG/JPG，自动上传）</label><input id="simage" type="file" accept="image/*"><button onclick="saveShoe()">新增/更新跑鞋</button><button class="danger" onclick="deleteShoe()">删除所选跑鞋</button></section><p><a href="./" style="color:var(--a)">← 返回训练面板</a></p></main><script>
const OWNER='xiadasy',REPO='site-training-panel',BRANCH='main';let data=null,sha=null,html=null,htmlSha=null;
const $=id=>document.getElementById(id),today=new Date().toLocaleDateString('sv-SE');$('wdate').value=$('ddate').value=today;$('token').value=localStorage.getItem('training_admin_token')||'';
function stat(s){$('status').textContent=s}function headers(){return {'Authorization':'Bearer '+$('token').value.trim(),'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}}
async function getFile(path){let r=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`,{headers:headers()});if(!r.ok)throw Error((await r.json()).message);let x=await r.json();return {sha:x.sha,text:decodeURIComponent(escape(atob(x.content.replace(/\n/g,''))))}}
async function putFile(path,text,fileSha,msg){let body={message:msg,content:btoa(unescape(encodeURIComponent(text))),branch:BRANCH};if(fileSha)body.sha=fileSha;let r=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`,{method:'PUT',headers:{...headers(),'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw Error((await r.json()).message);return await r.json()}
async function connect(){try{stat('读取中…');localStorage.setItem('training_admin_token',$('token').value.trim());let m=await getFile('merged_data.js?v=20260724-recovery8'),h=await getFile('index.html');sha=m.sha;htmlSha=h.sha;html=h.text;data=JSON.parse(m.text.replace(/^window\.MERGED_DATA=/,'').trim().replace(/;$/,''));refresh();stat(`已连接 · 数据截止 ${data.summary.latest_date}\n体重 ${data.weights.length} 条 · 跑鞋 ${data.shoes.length} 双`)}catch(e){stat('连接失败：'+e.message)}}
function shoeMeta(){let out={};let block=(html.match(/const SHOE_META=\{([\s\S]*?)\n\};/)||[])[1]||'';for(let m of block.matchAll(/'([^']+)'\s*:\s*\{display:'([^']+)',img:'([^']*)',limit:(\d+)\}/g))out[m[1]]={display:m[2],img:m[3],limit:+m[4]};return out}
function refresh(){let meta=shoeMeta(),opts=data.shoes.map(s=>`<option value="${s.name}">${meta[s.name]?.display||s.name}</option>`).join('');$('dshoe').innerHTML='<option value="">未选择</option>'+opts;$('shoeSelect').innerHTML='<option value="">新增跑鞋</option>'+opts}
async function saveData(msg){let text='window.MERGED_DATA='+JSON.stringify(data)+';\n';let r=await putFile('merged_data.js?v=20260724-recovery8',text,sha,msg);sha=r.content.sha;stat('已保存到 GitHub，网页约1–3分钟更新。')}
async function saveWeight(){if(!data)return stat('请先连接');let date=$('wdate').value,v=+$('weight').value;if(!date||!v)return stat('请填写日期和体重');data.weights=data.weights.filter(x=>x.date.slice(0,10)!==date);data.weights.push({date,value:v,source:$('wsource').value||'网页管理模式'});data.weights.sort((a,b)=>a.date.localeCompare(b.date));data.summary.latest_weight={value:v,source:$('wsource').value||'网页管理模式',date};data.days[date]??={runs:[],weight:null,shoe:null,feel:'无',coach:'无'};data.days[date].weight={value:v,source:$('wsource').value||'网页管理模式'};await saveData(`admin: 更新${date}体重`)}
async function saveDay(){if(!data)return stat('请先连接');let date=$('ddate').value;data.days[date]??={runs:[],weight:null,shoe:null,feel:'无',coach:'无'};if($('dshoe').value)data.days[date].shoe=$('dshoe').value;if($('feel').value)data.days[date].feel=$('feel').value;await saveData(`admin: 更新${date}跑鞋和感受`)}
function loadShoe(){let n=$('shoeSelect').value,s=data.shoes.find(x=>x.name===n)||{},m=shoeMeta()[n]||{};$('sname').value=n;$('sdisplay').value=m.display||n;$('skm').value=s.km||0;$('sruns').value=s.runs||0;$('snote').value=s.note||''}
async function uploadImage(file,name){let ext=(file.type.includes('png')?'png':'jpg'),path=`shoe-${name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||Date.now()}.${ext}`;let arr=new Uint8Array(await file.arrayBuffer()),bin='';arr.forEach(b=>bin+=String.fromCharCode(b));let r=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`,{method:'PUT',headers:{...headers(),'Content-Type':'application/json'},body:JSON.stringify({message:'admin: 上传跑鞋图片',content:btoa(bin),branch:BRANCH})});if(!r.ok)throw Error((await r.json()).message);return path}
async function saveShoe(){if(!data)return stat('请先连接');let name=$('sname').value.trim();if(!name)return stat('请输入内部名称');let s=data.shoes.find(x=>x.name===name);if(!s){s={name,km:0,runs:0};data.shoes.push(s)}s.km=+$('skm').value||0;s.runs=+$('sruns').value||0;s.note=$('snote').value;let meta=shoeMeta(),img=meta[name]?.img||'';if($('simage').files[0])img=await uploadImage($('simage').files[0],name);meta[name]={display:$('sdisplay').value||name,img,limit:800};let lines=Object.entries(meta).map(([k,v])=>`  '${k.replace(/'/g,"\\'")}': {display:'${v.display.replace(/'/g,"\\'")}',img:'${v.img}',limit:${v.limit||800}},`).join('\n');html=html.replace(/const SHOE_META=\{[\s\S]*?\n\};/,`const SHOE_META={\n${lines}\n};`);let hr=await putFile('index.html',html,htmlSha,'admin: 更新跑鞋配置');htmlSha=hr.content.sha;await saveData('admin: 更新跑鞋数据');refresh()}
async function deleteShoe(){let n=$('shoeSelect').value;if(!n||!confirm('确定删除 '+n+'？'))return;data.shoes=data.shoes.filter(x=>x.name!==n);await saveData('admin: 删除跑鞋 '+n);refresh()}
function forget(){localStorage.removeItem('training_admin_token');$('token').value='';stat('已清除本机凭证')}
if($('token').value)connect();</script></body></html>
